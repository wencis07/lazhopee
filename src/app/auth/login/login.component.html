<div class="login-wrapper">
  <div class="login-card">

    <div class="login-header">
      <h1>lazshopee</h1>
      <p>Sign in to your account</p>
    </div>

    <div class="login-body">
      <div class="form-group">
        <label>Email</label>
        <input type="email" [(ngModel)]="email" placeholder="Enter your email">
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" [(ngModel)]="password" placeholder="Enter your password">
      </div>

      <div class="error-msg" *ngIf="errorMessage">
        {{ errorMessage }}
      </div>

      <button class="btn-login" (click)="login()">Sign In</button>

      <p class="register-link">
        Don't have an account? <a routerLink="/register">Register here</a>
      </p>
    </div>

  </div>
</div>
