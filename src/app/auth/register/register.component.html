<div class="register-wrapper">
  <div class="register-card">

    <div class="register-header">
      <h1>lazshopee</h1>
      <p>Create your account</p>
    </div>

    <div class="register-body">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" [(ngModel)]="name" placeholder="Enter your full name">
      </div>

      <div class="form-group">
        <label>Email</label>
        <input type="email" [(ngModel)]="email" placeholder="Enter your email">
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" [(ngModel)]="password" placeholder="Enter your password">
      </div>

      <div class="form-group">
        <label>Register as</label>
        <select [(ngModel)]="role">
          <option value="customer">Customer</option>
          <option value="store_owner">Store Owner</option>
          <option value="courier">Courier</option>
        </select>
      </div>

      <div class="error-msg" *ngIf="errorMessage">{{ errorMessage }}</div>
      <div class="success-msg" *ngIf="successMessage">{{ successMessage }}</div>

      <button class="btn-register" (click)="register()">Create Account</button>

      <p class="login-link">
        Already have an account? <a routerLink="/login">Sign in here</a>
      </p>
    </div>

  </div>
</div>
