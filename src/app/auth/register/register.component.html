<div class="register-wrapper">
  <div class="register-left">
    <h2>JOIN THE MARKET.<br>START YOUR JOURNEY.</h2>
  </div>

  <div class="register-right">
    <div class="register-card">
      <div class="register-header">
        <h1>LAZSHOPEE</h1>
        <p>Create your account</p>
      </div>

      <div class="register-body">
        <div class="form-group">
          <label for="name">Full Name</label>
          <input
            id="name"
            type="text"
            [(ngModel)]="name"
            placeholder="Enter your full name"
          />
        </div>

        <div class="form-group">
          <label for="email">Email</label>
          <input
            id="email"
            type="email"
            [(ngModel)]="email"
            placeholder="Enter your email"
          />
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input
            id="password"
            type="password"
            [(ngModel)]="password"
            placeholder="Enter your password"
          />
        </div>

        <div class="form-group">
          <label for="role">Register as</label>
          <select id="role" [(ngModel)]="role">
            <option value="customer">Customer</option>
            <option value="store_owner">Store Owner</option>
            <option value="courier">Courier</option>
          </select>
        </div>

        <div class="error-msg" *ngIf="errorMessage">{{ errorMessage }}</div>
        <div class="success-msg" *ngIf="successMessage">{{ successMessage }}</div>

        <button class="btn-register" (click)="register()">Create Account</button>

        <p class="switch-link">
          Already have an account?
          <a routerLink="/login">Sign in here</a>
        </p>
      </div>
    </div>
  </div>
</div>
