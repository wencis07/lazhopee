<div class="container">
    <h3>Categories</h3>
    <div class="category-pills">
        <button class="pill" [class.active]="selectedCategory === 'all'" (click)="filterByCategory('all')">
            All
        </button>
        <button class="pill" *ngFor="let cat of categories" 
                [class.active]="selectedCategory === cat.name" 
                (click)="filterByCategory(cat.name)">
            {{ cat.name }}
        </button>
    </div>

    <h3>Just for you</h3>
    <div fxLayout="row wrap" fxLayoutGap="50px grid">
        <div *ngFor="let product of products">
            <mat-card class="product-card" appearance="outlined">
                <img mat-card-image [src]="product.imageUrl.startsWith('http') ? product.imageUrl : '/assets/images/' + product.imageUrl">
                <mat-card-content>
                    <mat-card-title>{{product.name}}</mat-card-title>
                    <mat-card-subtitle>{{product.price | currency: 'PHP'}}</mat-card-subtitle>
                     <p class="store-name" *ngIf="product.owner">🏪 {{ product.owner.name }}</p>
                </mat-card-content>
                <mat-card-actions>
                    <button mat-flat-button color="accent" (click)="addToCart(product)">Add to Cart</button>
                    <button mat-stroked-button class="btn-message" (click)="messageStore(product)" *ngIf="product.owner">Message Store</button>
                </mat-card-actions>
            </mat-card>
        </div>
    </div>

    <div *ngIf="products.length === 0" class="empty-state">
        No products found in this category.
    </div>
</div>

<!-- Message Dialog -->
<app-message-dialog 
  *ngIf="selectedProduct"
  [product]="selectedProduct"
  (close)="closeMessageDialog()">
</app-message-dialog>
