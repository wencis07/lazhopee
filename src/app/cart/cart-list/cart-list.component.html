<div class="cart-wrapper">

  <div class="cart-header">
    <i class="cart-icon">🛒</i>
    <h2>My Cart</h2>
    <span class="cart-count">{{ cartItems.length }} item(s)</span>
  </div>

  <div class="cart-body">

    <!-- Cart Items -->
   <!-- Cart Items -->
<div class="cart-items">

  <div class="store-section" *ngFor="let group of groupedCart">

    <!-- Store Header -->
    <div class="store-header">
      <span class="store-title">
        🏪 {{ group.store.name }}
      </span>
    </div>

    <!-- Products -->
    <div class="cart-item" *ngFor="let item of group.items">

      <div class="item-img">
        <img
          [src]="item.imageUrl.startsWith('http')
            ? item.imageUrl
            : '/assets/images/' + item.imageUrl">
      </div>

      <div class="item-details">
        <span class="item-name">
          {{ item.name }}
        </span>

        <span class="item-price">
          {{ item.price | currency:'PHP' }}
        </span>
      </div>

    </div>

    <!-- Store Total -->
    <div class="store-summary">

      <span class="store-total">
        Store Total
      </span>

      <span class="store-price">
        {{ group.total | currency:'PHP' }}
      </span>

    </div>

    <!-- Store Checkout -->
    <div class="store-actions">

      <button
        mat-flat-button
        color="accent"
        class="btn-checkout"
        (click)="checkoutStore(group)">

        Checkout

      </button>

    </div>

  </div>

</div>
</div>

</div>

    <!-- Total -->
    <div class="cart-total">
      <span class="total-label">Total</span>
      <span class="total-price">{{ totalPrice | currency: 'PHP' }}</span>
    </div>

    <!-- Address Form -->
    <!-- Address Form -->
<div class="checkout-modal" *ngIf="showAddressForm">

  <div class="checkout-card"><h3>Delivery Address</h3>
    <p>
      Please enter the delivery address for this order.
    </p>
    <textarea [(ngModel)]="deliveryAddress"
      placeholder="House No., Street, Barangay, City, Province"
      rows="4">
    </textarea>
    <div class="address-actions">
      <button
        class="btn-cancel-address"
        (click)="cancelCheckout()">Cancel</button>
      <button
        class="btn-confirm"
        (click)="confirmCheckout()">Confirm Order
      </button>
    </div>
  </div>
</div>
    <!-- Actions -->
    <div class="cart-actions" *ngIf="!showAddressForm">
      <button class="back-btn" routerLink="/products">← Back to Products</button>
      <div class="action-buttons">
        <button mat-stroked-button class="btn-clear" (click)="clearCart()">
          🗑 Clear Cart
        </button>
      </div>
    </div>
