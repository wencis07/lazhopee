<div class="cart-wrapper">

  <div class="cart-header">
    <i class="cart-icon">🛒</i>
    <h2>My Cart</h2>
    <span class="cart-count">{{ cartItems.length }} item(s)</span>
  </div>

  <div class="cart-body">

    <!-- Cart Items -->
    <div class="cart-items">
      <div class="cart-item" *ngFor="let item of cartItems">
        <div class="item-img">
          <img [src]="'/assets/images/' + item.imageUrl" alt="{{ item.name }}">
        </div>
        <div class="item-details">
          <span class="item-name">{{ item.name }}</span>
          <span class="item-price">{{ item.price | currency: 'PHP' }}</span>
        </div>
      </div>
    </div>

    <!-- Total -->
    <div class="cart-total">
      <span class="total-label">Total</span>
      <span class="total-price">{{ totalPrice | currency: 'PHP' }}</span>
    </div>

    <!-- Actions -->
    <div class="cart-actions">
      <button class="back-btn" routerLink="/products">← Back to Products</button>
      <div class="action-buttons">
        <button mat-stroked-button class="btn-clear" (click)="clearCart()">
          🗑 Clear Cart
        </button>
        <button mat-flat-button color="accent" class="btn-checkout" (click)="checkout()">
          Checkout →
        </button>
      </div>
    </div>

  </div>

</div>
